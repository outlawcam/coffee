<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stancraft Coffee Co</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<style>
  html { scroll-behavior: smooth; }
  html, body { margin: 0; background: var(--paper-100); }
  a { color: var(--accent); }
  a:hover { color: var(--accent-hover); }
  .navlink { position: relative; transition: color var(--dur) var(--ease-standard); }
  .navlink::after { content: ''; position: absolute; left: 0; right: 0; bottom: -6px; height: 2px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform var(--dur) var(--ease-standard); }
  .navlink:hover::after { transform: scaleX(1); }
  .navlink:hover { color: var(--accent) !important; }

  /* Buttons — the design-system Button renders inline styles with no hover, so
     hover/press feedback lives here and uses !important to beat those inline
     background/color values. */
  .btn-primary, .btn-outline, .btn-outline-light { transition: background var(--dur) var(--ease-standard), border-color var(--dur) var(--ease-standard), color var(--dur) var(--ease-standard), transform var(--dur-fast) var(--ease-standard); }
  .btn-primary:hover { background: var(--red-600) !important; border-color: var(--red-600) !important; }
  .btn-outline:hover { background: var(--ink-900) !important; color: var(--paper-100) !important; }
  .btn-outline-light:hover { background: var(--paper-100) !important; color: var(--espresso-900) !important; }
  .btn-primary:active, .btn-outline:active, .btn-outline-light:active { transform: translateY(1px); }

  /* Text links */
  .link-accent { transition: color var(--dur) var(--ease-standard); }
  .link-accent:hover { color: var(--accent-hover) !important; }
  .link-footer { transition: color var(--dur) var(--ease-standard); }
  .link-footer:hover { color: var(--accent) !important; }
  .link-footer:hover span { border-color: var(--accent) !important; }

  /* Brew-method filter pills (unselected pills darken their border on hover) */
  .brewpill:hover { border-color: var(--ink-900) !important; }

  /* ---------- Responsive ---------- */
  img { max-width: 100%; }
  input, select, textarea, button { box-sizing: border-box; }

  /* Nav collapses into a hamburger + drawer below the breakpoint */
  .nav-mobile { display: none; }
  .drawer-link { transition: color var(--dur) var(--ease-standard); }
  .drawer-link:hover { color: var(--accent) !important; }
  @media (max-width: 768px) {
    .nav-desktop { display: none !important; }
    .nav-mobile { display: flex !important; }
  }

  /* Multi-column grids stack; gutters + headings shrink */
  @media (max-width: 900px) {
    .grid-products { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 768px) {
    .appheader { padding-left: 22px !important; padding-right: 22px !important; }
    .sect { padding: 60px 22px !important; }
    .hero-sect { padding: 88px 22px 64px !important; }
    .foot-inner { padding: 52px 22px 32px !important; }
    .grid-split { grid-template-columns: 1fr !important; }
    .grid-3 { grid-template-columns: 1fr !important; }
    .h1 { font-size: 42px !important; }
    .h2 { font-size: 30px !important; }
    .hero-lead { font-size: 17px !important; }
  }
  @media (max-width: 540px) {
    .grid-products { grid-template-columns: 1fr !important; }
    .h1 { font-size: 34px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
